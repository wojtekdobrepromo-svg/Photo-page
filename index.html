<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aparat HD - GitHub</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; }
        video { width: 90%; max-width: 800px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { margin: 20px; padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>Aparat Foto HD</h1>
    <video id="video" autoplay playsinline></video>
    <button id="snap">Zrób zdjęcie</button>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');

        // Funkcja uruchamiająca kamerę w max rozdzielczości
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: { ideal: 4096 }, // Próba wymuszenia 4K
                        height: { ideal: 2160 } 
                    }
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Błąd dostępu do kamery: ", err);
                alert("Nie można uzyskać dostępu do kamery.");
            }
        }

        // Funkcja robienia zdjęcia
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Generowanie nazwy pliku: RRRR-MM-DD_GG-MM-SS
            const now = new Date();
            const timestamp = now.toISOString().replace(/[:T]/g, '-').split('.')[0];
            const fileName = `foto_${timestamp}.png`;

            // Pobieranie zdjęcia
            const link = document.createElement('a');
            link.download = fileName;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        initCamera();
    </script>
</body>
</html>
